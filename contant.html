<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="./Style/style.css">
    <title>TShop-Contact</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">T-Shop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                <a class="nav-link" aria-current="page" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="contant.html">Contact</a>
                </li>
                <li class="nav-item">
                <a class="nav-link" href="about.html">About</a>
                </li>
            </ul>
            </div>
        </div>
    </nav>
    <main class="mt-5 pt-5">
        <section class="container py-5">
            <div class="row" style="margin-bottom: 50px;">
                <div class="col-md-6">
                    <h4 style="font-size: 30px; font-weight: 600; ">Contact Us</h4>
                    <p style="font-size: 20px;">Have a question or want to collaborate? Send us a message.</p>
                    <form action="">
                        <div class="mb-3">
                            <label for="name">Name</label><br>
                            <input type="text" id="name">
                        </div>
                        <div class="mb-3">
                            <label for="Email">Email</label><br>
                            <input type="email" id="Email">
                        </div>
                        <div class="mb-3">
                            <label for="Message">Message</label><br>
                            <textarea class="form-control" id="message" rows="5" required=""></textarea>
                        </div>
                        <button class="btn btn-primary" style="font-size: 19px; font-weight: 550;">submit</button>
                    </form>
                </div>
                <div class="col-md-6">
                    <h5>Contact Info</h5>
                    <p>Address: hello@t-shop.com</p>
                    <p>Phone: +20 123 456 7890</p>
                    <p>Email: 123 Market Street, City, Country</p>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <h3>T-Shop © 2026 </h3>
        <div>
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-tiktok"></i></a>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
